name: PsBan
version: '2.0'
main: p.psban.PsBanPlugin
api-version: '1.21'
description: Ban de jugadores por región de ProtectionStones con detección automática de tiempo, región actual por defecto y empuje por vectores.
author: diuruijj

depend:
  - ProtectionStones

commands:
  ps:
    description: Comandos de PsBan
    usage: /ps <ban|unban|bypass|banlist|history> [args...]
    aliases:
      - psban

permissions:
  psban.ban:
    description: Permite banear/desbanear jugadores de regiones propias.
    default: true
  psban.admin:
    description: Permite banear en cualquier región y ver historial.
    default: op
  psban.bypass:
    description: Permite activar el modo bypass.
    default: op
  psban.notify:
    description: Recibe notificaciones de intento de entrada de baneados.
    default: op
